<svg viewBox="0 0 680 260" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Checkpoint 时间线与回滚</title>
<desc>Agent 每步生成不可变 checkpoint，回滚即把指针指回旧 checkpoint 并重新派生上下文</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<text x="40" y="34" fill="#e6edf3" font-size="14" font-weight="500" font-family="sans-serif">Checkpoint 时间线与回滚</text>
<line x1="90" y1="150" x2="600" y2="150" stroke="#444441" stroke-width="2"/>
<circle cx="110" cy="150" r="22" fill="#26215C" stroke="#7F77DD" stroke-width="1.5"/>
<text x="110" y="150" fill="#E6F1FB" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif">C0</text>
<text x="110" y="190" fill="#888780" text-anchor="middle" font-size="12" font-family="sans-serif">初始</text>
<circle cx="240" cy="150" r="22" fill="#26215C" stroke="#7F77DD" stroke-width="1.5"/>
<text x="240" y="150" fill="#E6F1FB" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif">C1</text>
<text x="240" y="190" fill="#888780" text-anchor="middle" font-size="12" font-family="sans-serif">决策点</text>
<circle cx="370" cy="150" r="22" fill="#26215C" stroke="#7F77DD" stroke-width="1.5"/>
<text x="370" y="150" fill="#E6F1FB" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif">C2</text>
<circle cx="520" cy="150" r="26" fill="#04342C" stroke="#1D9E75" stroke-width="2"/>
<text x="520" y="150" fill="#EAF3DE" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="sans-serif">C3</text>
<text x="520" y="192" fill="#1D9E75" text-anchor="middle" font-size="12" font-family="sans-serif">当前</text>
<path d="M 500 128 Q 320 40 262 132" fill="none" stroke="#E24B4A" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="360" y="52" fill="#F09595" text-anchor="middle" font-size="13" font-family="sans-serif">回滚 rollback</text>
<line x1="240" y1="172" x2="240" y2="214" stroke="#444441" stroke-width="1" stroke-dasharray="4 4"/>
<text x="240" y="232" fill="#888780" text-anchor="middle" font-size="11" font-family="sans-serif">从 C1 fork 新分支，重放至新 C2'</text>
</svg>